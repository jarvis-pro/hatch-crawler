# hatch-crawler v1 的本地一键起。
#
# 使用：
#   cp .env.docker.example .env
#   docker compose up --build
#   open http://localhost:3000
#
# 只有 2 个服务：postgres + web（web 内置 pg-boss worker，迁移自动跑）。

services:
  postgres:
    image: postgres:16-alpine
    container_name: hatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hatch}
      POSTGRES_USER: ${POSTGRES_USER:-hatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hatch}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      # 只绑 127.0.0.1，假设单用户本地，不暴露到外网
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-hatch} -d ${POSTGRES_DB:-hatch}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hatch-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-hatch}:${POSTGRES_PASSWORD:-hatch}@postgres:5432/${POSTGRES_DB:-hatch}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
